version: '3.8'
services:
  net-tool-server:
    build: .
    container_name: net-tool-server
    ports:
      - "8443:8443"
    volumes:
      - ./data:/data
      - ./config.toml:/app/config.toml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - NETTOOL_LISTEN_ADDR=0.0.0.0:8443
